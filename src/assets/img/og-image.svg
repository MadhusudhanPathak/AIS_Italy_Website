<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Deep navy-to-blue gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,179,237,0.08)" stroke-width="1"/>
    </pattern>

    <!-- Glow for accent circle -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#3b82f6"/>

  <!-- Decorative circle (top-right) -->
  <circle cx="980" cy="120" r="180" fill="rgba(59,130,246,0.10)" filter="url(#glow)"/>
  <circle cx="980" cy="120" r="100" fill="rgba(59,130,246,0.08)"/>

  <!-- Decorative circle (bottom-left) -->
  <circle cx="180" cy="540" r="130" fill="rgba(99,179,237,0.06)"/>

  <!-- Italian flag stripe — left edge accent -->
  <rect x="0" y="0" width="6" height="630" fill="#009246" opacity="0.8"/>
  <rect x="6" y="0" width="6" height="630" fill="#ffffff" opacity="0.6"/>
  <rect x="12" y="0" width="6" height="630" fill="#ce2b37" opacity="0.8"/>

  <!-- Logo shield / icon placeholder -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="56" height="64" rx="8" fill="#3b82f6" opacity="0.9"/>
    <text x="28" y="44" font-family="Georgia, serif" font-size="36" font-weight="bold"
          fill="white" text-anchor="middle">AI</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="310"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="800" fill="white" letter-spacing="-1">
    AI Safety for Italy
  </text>

  <!-- Tagline -->
  <text x="80" y="375"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="400" fill="rgba(199,220,255,0.85)" letter-spacing="0.5">
    Building a safer future through awareness, education and community
  </text>

  <!-- Divider line -->
  <rect x="80" y="410" width="120" height="3" rx="2" fill="#3b82f6"/>

  <!-- Descriptor pills -->
  <!-- Pill 1 -->
  <rect x="80" y="440" width="180" height="40" rx="20" fill="rgba(59,130,246,0.25)" stroke="rgba(99,179,237,0.4)" stroke-width="1"/>
  <text x="170" y="466" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="rgba(200,220,255,0.95)" text-anchor="middle">🤝 Community</text>

  <!-- Pill 2 -->
  <rect x="276" y="440" width="180" height="40" rx="20" fill="rgba(59,130,246,0.25)" stroke="rgba(99,179,237,0.4)" stroke-width="1"/>
  <text x="366" y="466" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="rgba(200,220,255,0.95)" text-anchor="middle">🎓 Education</text>

  <!-- Pill 3 -->
  <rect x="472" y="440" width="210" height="40" rx="20" fill="rgba(59,130,246,0.25)" stroke="rgba(99,179,237,0.4)" stroke-width="1"/>
  <text x="577" y="466" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18" fill="rgba(200,220,255,0.95)" text-anchor="middle">🔬 Research</text>

  <!-- URL footer -->
  <text x="80" y="580"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" fill="rgba(147,197,253,0.75)" letter-spacing="1">
    aisafetycommunity.it
  </text>
</svg>
